{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiCo Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}?v=20260511">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}?v=20260511">
    <link rel="stylesheet" href="{% static 'css/hero.css' %}?v=20260511">
    <link rel="stylesheet" href="{% static 'css/carousel.css' %}?v=20260511">
    <link rel="stylesheet" href="{% static 'css/menu.css' %}?v=20260511">
    <link rel="stylesheet" href="{% static 'css/about.css' %}?v=20260511">
    <link rel="stylesheet" href="{% static 'css/why.css' %}?v=20260511">
    <link rel="stylesheet" href="{% static 'css/testimonial.css' %}?v=20260511">
    <link rel="stylesheet" href="{% static 'css/contact.css' %}?v=20260511">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}?v=20260511">
</head>
<body>

    <header class="site-header">
        <div class="container-header">
            <a href="#home" class="logo" aria-label="FiCo Cafe">
                <img src="{% static 'images/logo.jpg' %}" alt="FiCo Cafe logo">
                <span class="logo-text">FiCo Cafe</span>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About Us</a></li>
                    <li><a href="#why">Why Choose</a></li>
                        <li><a href="#contact">Contacts</a></li>
                </ul>
            </nav>
            <a href="#menu" class="nav-cta">View Menu</a>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-orbit"></div>
        <div class="container footer-top">
            <div class="footer-note">
                <p>Check it out <br>now.</p>
            </div>
        </div>
        <div class="container footer-hero">
            <div class="footer-wordmark" aria-hidden="true">FICO</div>
        </div>
        <div class="container footer-credit">
            <span>Made by Freiderich Peralta</span>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
